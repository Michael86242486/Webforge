kind = "web"
previewPath = "/"
title = "WebForge"
version = "1.0.0"
id = "artifacts/webforge-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23726

[services.development]
run = "pnpm --filter @workspace/webforge-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/webforge-ui", "run", "build" ]
publicDir = "artifacts/webforge-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23726"
BASE_PATH = "/"
