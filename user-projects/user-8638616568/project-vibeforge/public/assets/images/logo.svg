<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f7ff" />
      <stop offset="50%" stop-color="#ff00f7" />
      <stop offset="100%" stop-color="#f7ff00" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .neon-text {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: 72px;
        fill: url(#neonGradient);
        filter: url(#neonGlow);
        text-transform: uppercase;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #00f7ff, 0 0 20px #ff00f7, 0 0 30px #f7ff00;
        animation: pulse 2s infinite alternate;
      }
      @keyframes pulse {
        from { opacity: 0.9; }
        to { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0a0a1a" />

  <g transform="translate(20, 120)">
    <text class="neon-text" x="0" y="0">Vibe</text>
    <text class="neon-text" x="280" y="0" fill="#ff00f7">Forge</text>
  </g>

  <line x1="20" y1="140" x2="380" y2="140" stroke="url(#neonGradient)" stroke-width="2" stroke-dasharray="5,5" opacity="0.7" />

  <circle cx="200" cy="160" r="4" fill="url(#neonGradient)" filter="url(#neonGlow)" />
</svg>