<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" />
      <stop offset="50%" stop-color="#ff2a6d" />
      <stop offset="100%" stop-color="#00f5d4" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      <![CDATA[
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
        text {
          font-family: 'Inter', sans-serif;
          font-weight: 700;
          font-size: 64px;
          fill: url(#neonGradient);
          filter: url(#neonGlow);
          text-shadow: 0 0 10px rgba(0, 245, 212, 0.7), 0 0 20px rgba(255, 42, 109, 0.5);
          letter-spacing: 2px;
        }
        .subtext {
          font-size: 20px;
          fill: #e0e0e0;
          filter: none;
          text-shadow: none;
          letter-spacing: 3px;
        }
      ]]>
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0a0a0f" />

  <g transform="translate(20, 60)">
    <text x="0" y="0">VIBE</text>
    <text x="0" y="70" class="subtext">FORGE</text>
  </g>

  <g transform="translate(250, 30)">
    <path d="M0,0 L20,35 L40,0 L20,20 Z" fill="url(#neonGradient)" filter="url(#neonGlow)" />
  </g>
</svg>