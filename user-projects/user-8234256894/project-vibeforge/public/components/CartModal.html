<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeForge | Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="modal-overlay" id="cartModal">
        <div class="glassmorphism-panel cart-modal">
            <div class="modal-header">
                <h2 class="neon-heading">Your Cart</h2>
                <button class="close-btn" id="closeCartModal" aria-label="Close cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="cart-items-container" id="cartItemsContainer">
                <!-- Cart items will be dynamically inserted here -->
                <div class="empty-cart-message" id="emptyCartMessage">
                    <p>Your cart is empty. Add some tracks to get started!</p>
                </div>
            </div>

            <div class="modal-footer">
                <div class="cart-summary">
                    <p>Total: <span id="cartTotal">$0.00</span></p>
                </div>
                <button class="cta-button checkout-btn" id="checkoutBtn" disabled>
                    <span>Checkout</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="../utils/api.js"></script>
    <script src="../app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cartModal = document.getElementById('cartModal');
            const closeCartModal = document.getElementById('closeCartModal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            const cartItemsContainer = document.getElementById('cartItemsContainer');
            const emptyCartMessage = document.getElementById('emptyCartMessage');
            const cartTotal = document.getElementById('cartTotal');

            let cart = JSON.parse(localStorage.getItem('vibeforge_cart')) || [];

            function renderCart() {
                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = '';
                    emptyCartMessage.style.display = 'block';
                    checkoutBtn.disabled = true;
                    cartTotal.textContent = '$0.00';
                    return;
                }

                emptyCartMessage.style.display = 'none';
                checkoutBtn.disabled = false;

                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item glassmorphism-panel" data-id="${item.id}">
                        <div class="cart-item-info">
                            <h3 class="neon-subheading">${item.title}</h3>
                            <p class="artist-name">${item.artist || 'VibeForge'}</p>
                            <p class="item-price">$${item.price.toFixed(2)}</p>
                        </div>
                        <div class="cart-item-controls">
                            <button class="quantity-btn minus" data-action="decrease" data-id="${item.id}" aria-label="Decrease quantity">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M5 12H19" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <span class="quantity">${item.quantity}</span>
                            <button class="quantity-btn plus" data-action="increase" data-id="${item.id}" aria-label="Increase quantity">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 5V19M5 12H19" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <button class="remove-btn" data-id="${item.id}" aria-label="Remove item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M3 6H5H21M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6M10 11V17M14 11V17" stroke="#ff2e2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `).join('');

                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                cartTotal.textContent = `$${total.toFixed(2)}`;

                document.querySelectorAll('.quantity-btn, .remove-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.closest('button').dataset.id;
                        const action = e.target.closest('button').dataset.action;
                        updateCartItem(id, action);
                    });
                });
            }

            function updateCartItem(id, action) {
                cart = cart.map(item => {
                    if (item.id === id) {
                        if (action === 'increase') {
                            return { ...item, quantity: item.quantity + 1 };
                        } else if (action === 'decrease') {
                            return { ...item, quantity: Math.max(1, item.quantity - 1) };
                        }
                    }
                    return item;
                });

                if (action === 'remove') {
                    cart = cart.filter(item => item.id !== id);
                }

                localStorage.setItem('vibeforge_cart', JSON.stringify(cart));
                renderCart();
                window.dispatchEvent(new Event('cartUpdated'));
            }

            closeCartModal.addEventListener('click', () => {
                cartModal.classList.remove('active');
            });

            checkoutBtn.addEventListener('click', () => {
                if (cart.length > 0) {
                    window.dispatchEvent(new CustomEvent('checkout', { detail: cart }));
                    cartModal.classList.remove('active');
                }
            });

            document.querySelectorAll('.quantity-btn, .remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.closest('button').dataset.id;
                    const action = e.target.closest('button').dataset.action || 'remove';
                    updateCartItem(id, action);
                });
            });

            renderCart();
        });
    </script>
</body>
</html>
