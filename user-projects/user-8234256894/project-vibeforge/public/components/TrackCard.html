<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeForge - Track Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="track-card" data-track-id="1">
        <div class="track-card-image">
            <div class="track-artwork">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="artGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" rx="10" fill="url(#artGradient)" />
                    <path d="M20 80 L50 20 L80 80 Z" fill="rgba(0,0,0,0.2)" />
                </svg>
            </div>
            <div class="track-overlay">
                <button class="play-pause-btn" aria-label="Play track">
                    <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 5V19L19 12L8 5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    </svg>
                    <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                        <rect x="6" y="4" width="4" height="16" fill="currentColor"/>
                        <rect x="14" y="4" width="4" height="16" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="track-card-info">
            <h3 class="track-title">Neon Dreams</h3>
            <p class="track-artist">VibeForge</p>
            <div class="track-meta">
                <span class="track-duration">3:42</span>
                <span class="track-bpm">128 BPM</span>
            </div>
            <p class="track-description">
                A synthwave anthem that transports you to a cyberpunk metropolis at midnight.
            </p>
        </div>
        <div class="track-card-actions">
            <div class="track-price">$12.99</div>
            <button class="add-to-cart-btn" aria-label="Add to cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span>Add</span>
            </button>
        </div>
        <div class="track-card-glow"></div>
    </div>

    <script src="../utils/api.js"></script>
    <script>
        (function() {
            const card = document.querySelector('.track-card');
            const playPauseBtn = card.querySelector('.play-pause-btn');
            const playIcon = card.querySelector('.play-icon');
            const pauseIcon = card.querySelector('.pause-icon');
            const addToCartBtn = card.querySelector('.add-to-cart-btn');
            const audio = new Audio('../assets/audio/placeholder.mp3');

            let isPlaying = false;
            let isInCart = false;

            playPauseBtn.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    playIcon.style.display = 'block';
                    pauseIcon.style.display = 'none';
                } else {
                    audio.play();
                    playIcon.style.display = 'none';
                    pauseIcon.style.display = 'block';
                }
                isPlaying = !isPlaying;
                card.classList.toggle('playing', isPlaying);
            });

            addToCartBtn.addEventListener('click', () => {
                if (isInCart) {
                    addToCartBtn.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span>Add</span>
                    `;
                    addToCartBtn.classList.remove('in-cart');
                    isInCart = false;
                } else {
                    addToCartBtn.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        <span>In Cart</span>
                    `;
                    addToCartBtn.classList.add('in-cart');
                    isInCart = true;
                    const event = new CustomEvent('trackAdded', {
                        detail: {
                            id: card.dataset.trackId,
                            title: card.querySelector('.track-title').textContent,
                            artist: card.querySelector('.track-artist').textContent,
                            price: card.querySelector('.track-price').textContent
                        }
                    });
                    document.dispatchEvent(event);
                }
            });

            audio.addEventListener('ended', () => {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                isPlaying = false;
                card.classList.remove('playing');
            });
        })();
    </script>
</body>
</html>
